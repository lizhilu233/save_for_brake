<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能分析平台 - 风险仪表盘</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --danger: #dc2626;
      --warn: #d97706;
      --ok: #16a34a;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      width: min(1100px, 94vw);
      margin: 20px auto 30px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
    select, button {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn-primary:hover { filter: brightness(0.95); }
    .btn-light:hover { background: #f9fafb; }
    .kpi {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .kpi-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    .kpi-item p { margin: 0; color: var(--muted); font-size: 12px; }
    .kpi-item h3 { margin: 8px 0 0; font-size: 24px; }
    .dist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .dist-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    .dist-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .dist-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .dist-row {
      display: grid;
      grid-template-columns: 92px 1fr 52px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .dist-label {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dist-bar-wrap {
      background: #eef2ff;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }
    .dist-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      border-radius: 999px;
    }
    .dist-val {
      text-align: right;
      color: var(--muted);
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; font-size: 12px; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .tag-high { background: #fee2e2; color: var(--danger); }
    .tag-mid { background: #fef3c7; color: var(--warn); }
    .tag-low { background: #dcfce7; color: var(--ok); }
    .link-btn {
      background: transparent;
      border: 0;
      color: var(--primary);
      padding: 0;
      cursor: pointer;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 10px;
    }
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .modal {
      width: min(760px, 96vw);
      max-height: 92vh;
      overflow-y: auto;
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 16px;
    }
    .modal h2 { margin-top: 0; font-size: 20px; }
    .modal p { margin: 8px 0; line-height: 1.55; }
    .close-row { text-align: right; margin-top: 10px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

          <select id="levelFilter"></select>
        </div>
        <div style="display:flex; gap:8px; align-items:end;">

          <button class="btn-light" id="resetBtn">重置</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="kpi">

        <div class="kpi-item"><p>高频场景</p><h3 id="kpiTopScene">-</h3></div>
      </div>
    </div>

    <div class="panel">
      <div class="dist-grid">
        <div class="dist-card">
          <h3>事故车型分布</h3>
          <div class="dist-list" id="carDist"></div>
        </div>
        <div class="dist-card">

          <div class="dist-list" id="ageDist"></div>
        </div>
        <div class="dist-card">
          <h3>事故场景分布</h3>
          <div class="dist-list" id="sceneDist"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>地点</th>
              <th>车型</th>
              <th>驾驶员</th>
              <th>事故场景</th>
              <th>严重程度</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="caseBody"></tbody>
        </table>
      </div>
      <div class="empty" id="emptyState" style="display:none;">没有匹配的案例，请调整筛选条件。</div>
    </div>
  </div>

  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <h2 id="modalTitle">案例详情</h2>

      <p><strong>严重程度：</strong><span id="dSeverity"></span></p>
      <p><strong>经过：</strong><span id="dDesc"></span></p>
      <div class="close-row">
        <button class="btn-light" id="closeModalBtn" style="width:auto;">关闭</button>
      </div>
    </div>
  </div>

    "desc": "周某驾车遇红灯，因刚取得驾驶证不久，慌乱中误将油门当作刹车踩下，撞上前方出租车。",
    "car": "渝AFW3***号牌小型汽车",
    "driver": "周某，新手驾驶员",
    "scene": "城市路口等红灯",
    "cause": "经验不足、油门刹车混淆",
    "severity": "一般"
} 
    ];

    const state = {
      year: "全部",
      scene: "全部",
      level: "全部"
    };

    const yearFilter = document.getElementById("yearFilter");
    const sceneFilter = document.getElementById("sceneFilter");
    const levelFilter = document.getElementById("levelFilter");
    const caseBody = document.getElementById("caseBody");
    const emptyState = document.getElementById("emptyState");
    const carDist = document.getElementById("carDist");
    const ageDist = document.getElementById("ageDist");
    const sceneDist = document.getElementById("sceneDist");

    function getSeverityGroup(text) {
      if (text.includes("骨折") || text.includes("重伤") || text.includes("较大事故")) return "重大/特大";
      if (text.includes("轻伤") || text.includes("受伤")) return "一般/轻微";
      if (text.includes("财产")) return "财产损失";
      return "其他";
    }

    function severityTagClass(severity) {
      if (severity === "重大" || severity === "特大") {
        return "tag-high";
      } else if (severity === "轻微") {
        return "tag-mid";
      } else {
        return "tag-low";
      }
    }

    function setupOptions() {
      yearFilter.innerHTML = "";
      sceneFilter.innerHTML = "";
      levelFilter.innerHTML = "";
      const years = ["全部", ...new Set(allCases.map(item => item.year))];
      const scenes = ["全部", ...new Set(allCases.map(item => item.scene.split("、")[0]))];
      const levels = ["全部", ...new Set(allCases.map(item => getSeverityGroup(item.severity)))];

      years.forEach(y => yearFilter.add(new Option(y, y)));
      scenes.forEach(s => sceneFilter.add(new Option(s, s)));
      levels.forEach(l => levelFilter.add(new Option(l, l)));
    }

    function getCarCategory(text) {
      const inParen = text.match(/（([^）]+)）/);
      if (inParen && inParen[1]) return inParen[1];
      return text;
    }

    function getAgeGroup(driverText) {
      const ageMatch = driverText.match(/(\d+)\s*岁/);
      if (!ageMatch) return "未知";
      const age = Number(ageMatch[1]);
      if (age < 30) return "30岁以下";
      if (age < 45) return "30-44岁";
      if (age < 60) return "45-59岁";
      return "60岁及以上";
    }

    function countBy(list, keyFn) {
      const out = {};
      list.forEach(item => {
        const key = keyFn(item);
        out[key] = (out[key] || 0) + 1;
      });
      return out;
    }

    function renderDist(el, countMap, total) {
      el.innerHTML = "";
      const entries = Object.entries(countMap).sort((a, b) => b[1] - a[1]);
      if (!entries.length) {
        el.innerHTML = '<div class="empty" style="padding:8px 0;">暂无数据</div>';
        return;
      }
      entries.forEach(([name, count]) => {
        const pct = total ? Math.round((count / total) * 100) : 0;
        const row = document.createElement("div");
        row.className = "dist-row";
        row.innerHTML = `
          <span class="dist-label" title="${name}">${name}</span>
          <span class="dist-bar-wrap"><span class="dist-bar" style="width:${pct}%"></span></span>
          <span class="dist-val">${count} (${pct}%)</span>
        `;
        el.appendChild(row);
      });
    }

    function getFilteredCases() {
      return allCases.filter(item => {
        const sceneHead = item.scene.split("、")[0];
        const level = item.severity;
        return (state.year === "全部" || item.year === state.year)
          && (state.scene === "全部" || sceneHead === state.scene)
          && (state.level === "全部" || level === state.level);
      });
    }

    function renderKpis(list) {
      document.getElementById("kpiTotal").textContent = list.length;
      document.getElementById("kpiInjury").textContent = list.filter(x => x.severity.includes("受伤") || x.severity.includes("骨折")).length;
      document.getElementById("kpiSenior").textContent = list.filter(x => x.driver.includes("老年") || x.driver.includes("高龄")).length;

      const freq = {};
      list.forEach(x => {
        const key = x.scene.split("、")[0];
        freq[key] = (freq[key] || 0) + 1;
      });
      const top = Object.entries(freq).sort((a, b) => b[1] - a[1])[0];
      document.getElementById("kpiTopScene").textContent = top ? top[0] : "-";
    }

    function openDetail(item) {
      document.getElementById("modalTitle").textContent = item.title;
      document.getElementById("dTime").textContent = item.time;
      document.getElementById("dLocation").textContent = item.location;
      document.getElementById("dCar").textContent = item.car;
      document.getElementById("dDriver").textContent = item.driver;
      document.getElementById("dScene").textContent = item.scene;
      document.getElementById("dCause").textContent = item.cause;
      document.getElementById("dSeverity").textContent = item.severity;
      document.getElementById("dDesc").textContent = item.desc;
      document.getElementById("modalMask").style.display = "flex";
    }

    function renderTable(list) {
      caseBody.innerHTML = "";
      if (!list.length) {
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";
      list.forEach(item => {
        const row = document.createElement("tr");
        const level = item.severity;
        row.innerHTML = `
          <td>${item.time}</td>
          <td>${item.location}</td>
          <td>${item.car}</td>
          <td>${item.driver}</td>
          <td>${item.scene}</td>
          <td><span class="tag ${severityTagClass(level)}">${level}</span></td>
          <td><button class="link-btn" data-id="${item.id}">查看详情</button></td>
        `;
        caseBody.appendChild(row);
      });
    }

    function renderDistributions(list) {
      const total = list.length;
      const carMap = countBy(list, item => getCarCategory(item.car));
      const ageMap = countBy(list, item => getAgeGroup(item.driver));
      const sceneMap = countBy(list, item => item.scene.split("、")[0]);
      renderDist(carDist, carMap, total);
      renderDist(ageDist, ageMap, total);
      renderDist(sceneDist, sceneMap, total);
    }

    function render() {
      const filtered = getFilteredCases();
      renderKpis(filtered);
      renderDistributions(filtered);
      renderTable(filtered);
    }

    function pickField(row, keys) {
      for (const key of keys) {
        if (row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== "") {
          return String(row[key]).trim();
        }
      }
      return "";
    }

    function normalizeExcelRow(row) {
      const normalized = {};
      Object.keys(row).forEach(key => {
        normalized[String(key).replace(/\s+/g, "").trim()] = row[key];
      });
      return normalized;
    }

    function toCaseItem(rawRow, index) {
      const row = normalizeExcelRow(rawRow);
      const time = pickField(row, ["时间", "事故时间", "date", "time"]);
      const yearField = pickField(row, ["年份", "year"]);
      const matchedYear = time.match(/(20\d{2})/);
      const year = yearField || (matchedYear ? matchedYear[1] : "未知");
      const location = pickField(row, ["地点", "事故地点", "location", "地址"]) || "未提供";
      const car = pickField(row, ["车型", "车型品牌", "car", "车辆"]) || "未提供";
      const driver = pickField(row, ["驾驶员", "驾驶员信息", "driver", "年龄性别"]) || "未提供";
      const scene = pickField(row, ["事故场景", "场景", "scene"]) || "未提供";
      const cause = pickField(row, ["事故原因", "原因", "cause"]) || "未提供";
      const severity = pickField(row, ["严重程度", "等级", "severity"]) || "未提供";
      const desc = pickField(row, ["经过", "事故经过", "描述", "desc", "详情"]) || "未提供";
      const title = pickField(row, ["标题", "案例标题", "title"]) || `案例${index + 1}`;

      return {
        id: index + 1,
        title,
        time: time || "未提供",
        year,
        location,
        desc,
        car,
        driver,
        scene,
        cause,
        severity
      };
    }

    async function tryLoadExcelData() {
      if (!window.XLSX) return;
      const candidates = [
        "误踩油门事故案例分析数据集.xlsx",
        "误踩油门事故案例分析数据集.xls"
      ];

      for (const fileName of candidates) {
        try {
          const response = await fetch(fileName);
          if (!response.ok) continue;
          const buffer = await response.arrayBuffer();
          const wb = XLSX.read(buffer, { type: "array" });
          const firstSheet = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
          if (!rows.length) continue;
          const parsed = rows.map((row, idx) => toCaseItem(row, idx));
          if (parsed.length) {
            allCases = parsed;
            return;
          }
        } catch (_) {
          // Ignore and continue fallback candidates.
        }
      }
    }

    document.getElementById("applyBtn").addEventListener("click", () => {
      state.year = yearFilter.value;
      state.scene = sceneFilter.value;
      state.level = levelFilter.value;
      render();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      yearFilter.value = "全部";
      sceneFilter.value = "全部";
      levelFilter.value = "全部";
      state.year = "全部";
      state.scene = "全部";
      state.level = "全部";
      render();
    });

    caseBody.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-id]");
      if (!btn) return;
      const id = Number(btn.dataset.id);
      const item = allCases.find(x => x.id === id);
      if (item) openDetail(item);
    });

    document.getElementById("closeModalBtn").addEventListener("click", () => {
      document.getElementById("modalMask").style.display = "none";
    });

    document.getElementById("modalMask").addEventListener("click", (event) => {
      if (event.target.id === "modalMask") {
        document.getElementById("modalMask").style.display = "none";
      }
    });

    async function init() {
      await tryLoadExcelData();
      setupOptions();
      render();
    }

    init();
  </script>
</body>
</html>
